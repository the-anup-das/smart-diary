services:
  frontend:
    image: ghcr.io/${GITHUB_USER}/smart-diary-frontend:${VERSION:-latest}
    container_name: notebook-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - notebook.env
    environment:
      - INTERNAL_BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_API_URL=${EXTERNAL_URL:-http://localhost}:8000
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - backend

  backend:
    image: ghcr.io/${GITHUB_USER}/smart-diary-backend:${VERSION:-latest}
    container_name: notebook-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - notebook.env
    environment:
      - DATABASE_URL=postgresql://${DB_USER:-diary_user}:${DB_PASSWORD:-diary_password}@db:5432/${DB_NAME:-diary_db}
      - QDRANT_URL=http://qdrant:6333
      - MEM0_DIR=/data/mem0
      - CHAT_MODEL=${CHAT_MODEL:-gpt-4o-mini}
      - EMBEDDING_MODEL=${EMBEDDING_MODEL:-text-embedding-3-small}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - JWT_SECRET=${JWT_SECRET}
      # STT: remove or leave blank to disable the voice feature entirely
      - STT_BASE_URL=${STT_BASE_URL:-http://stt-server:8000/v1}
      - STT_API_KEY=${STT_API_KEY:-not-needed}
      - STT_MODEL=${STT_MODEL:-Systran/faster-whisper-base.en}
    volumes:
      - /AppData/notebook/backend_data:/data
    depends_on:
      db:
        condition: service_healthy
      qdrant:
        condition: service_started
      stt-server:
        condition: service_started

  db:
    image: postgres:15-alpine
    container_name: notebook-db
    restart: unless-stopped
    env_file:
      - notebook.env
    environment:
      - POSTGRES_USER=${DB_USER:-diary_user}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-diary_password}
      - POSTGRES_DB=${DB_NAME:-diary_db}
    volumes:
      - /AppData/notebook/postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: notebook-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - /AppData/notebook/qdrant_data:/qdrant/storage

  # Whisper STT server — OpenAI-compatible /v1/audio/transcriptions
  # Remove/unset STT_BASE_URL in notebook.env to disable voice feature
  stt-server:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: notebook-stt
    restart: unless-stopped
    environment:
      WHISPER__MODEL: "${STT_MODEL:-Systran/faster-whisper-base.en}"
      WHISPER__MODEL_LOAD_TTL: 1800   # auto-unload from RAM after 30 min idle
      WHISPER__VAD_FILTER: "True"     # auto-filter silence and hallucinations
    volumes:
      - /AppData/notebook/stt_models:/root/.cache/huggingface
