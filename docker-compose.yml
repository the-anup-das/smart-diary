version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: diary-postgres
    restart: always
    environment:
      POSTGRES_USER: diary_user
      POSTGRES_PASSWORD: diary_password
      POSTGRES_DB: diary_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: diary-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - /app/.venv # Prevent Windows Host .venv from over-writing the Linux container!
    environment:
      # Natively maps Docker PostgreSQL DNS directly to SQLAlchemy
      - DATABASE_URL=postgresql://diary_user:diary_password@db:5432/diary_db
      - JWT_SECRET=super-secret-diary-key-you-should-change
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      # STT: remove or leave blank to disable voice feature entirely
      - STT_BASE_URL=http://stt-server:8000/v1
      - STT_API_KEY=not-needed
      - STT_MODEL=${STT_MODEL:-Systran/faster-whisper-base.en}
    depends_on:
      - db
      - qdrant
      - stt-server

  qdrant:
    image: qdrant/qdrant:latest
    container_name: diary-qdrant
    restart: always
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  # Whisper STT server — OpenAI-compatible /v1/audio/transcriptions
  # Remove STT_BASE_URL from backend env above to disable the voice feature
  stt-server:
    image: fedirz/faster-whisper-server:latest-cpu
    container_name: diary-stt
    restart: always
    environment:
      WHISPER__MODEL: "${STT_MODEL:-Systran/faster-whisper-base.en}"
      WHISPER__MODEL_LOAD_TTL: 1800  # unload from RAM after 30 min idle
      WHISPER__VAD_FILTER: "True"    # auto-filter silence and hallucinations
    ports:
      - "8001:8000"
    volumes:
      - stt_models:/root/.cache/huggingface  # persist downloaded model weights

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: diary-frontend
    ports:
      - "3000:3000"
    volumes:
      # Local volume mounted for rapid React hot-reloading
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - INTERNAL_BACKEND_URL=http://backend:8000
      - NEXT_PUBLIC_API_URL=http://localhost:8000
      - JWT_SECRET=super-secret-diary-key-you-should-change
    depends_on:
      - backend

volumes:
  postgres_data:
  qdrant_data:
  stt_models:
